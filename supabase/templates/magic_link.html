<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Your Aspire login link</title>
</head>
<body style="margin:0;padding:0;background-color:#0a0a0a;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;">
  <table width="100%" cellpadding="0" cellspacing="0" style="background-color:#0a0a0a;padding:40px 20px;">
    <tr>
      <td align="center">
        <table width="480" cellpadding="0" cellspacing="0" style="background-color:#1C1C1E;border-radius:16px;border:1px solid #2C2C2E;overflow:hidden;">
          <!-- Header -->
          <tr>
            <td style="padding:32px 32px 24px;text-align:center;">
              <div style="font-size:24px;font-weight:700;color:#fff;letter-spacing:-0.5px;">Aspire</div>
              <div style="font-size:12px;color:#71717A;margin-top:4px;letter-spacing:0.5px;">GOVERNED AI FOR SMALL BUSINESS</div>
            </td>
          </tr>
          <!-- Body -->
          <tr>
            <td style="padding:0 32px 32px;">
              <h1 style="color:#fff;font-size:20px;font-weight:600;margin:0 0 12px;letter-spacing:-0.3px;">Your login link</h1>
              <p style="color:#A1A1AA;font-size:14px;line-height:22px;margin:0 0 24px;">
                Click the button below to sign in to Aspire. This link is single-use and expires in 1 hour.
              </p>
              <a href="{{ .ConfirmationURL }}" style="display:inline-block;background-color:#3B82F6;color:#fff;font-size:14px;font-weight:600;text-decoration:none;padding:12px 28px;border-radius:8px;">
                Sign In to Aspire
              </a>
            </td>
          </tr>
          <!-- Footer -->
          <tr>
            <td style="padding:24px 32px;border-top:1px solid #2C2C2E;">
              <p style="color:#52525B;font-size:12px;line-height:18px;margin:0;">
                If you didn't request this login link, you can safely ignore this email.
              </p>
              <p style="color:#3F3F46;font-size:11px;margin:12px 0 0;">
                Aspire &mdash; Governed AI for small business &bull; aspireos.app
              </p>
            </td>
          </tr>
        </table>
      </td>
    </tr>
  </table>
</body>
</html>
