name: Dependency Update Gate

on:
  pull_request:
    branches: [main]
    paths:
      - ".github/dependabot.yml"
      - ".github/dependency-policy.yml"
      - ".github/workflows/dependency-update-gate.yml"
      - "tools/ci/dependency_policy_check.py"
      - "backend/orchestrator/pyproject.toml"
      - "backend/orchestrator/uv.lock"
      - "backend/gateway/package.json"
      - "backend/gateway/package-lock.json"
      - "Aspire/Aspire/package.json"
      - "Aspire/Aspire/package-lock.json"
      - "Aspire-desktop/package.json"
      - "Aspire-desktop/package-lock.json"
      - "package.json"
      - "package-lock.json"
      - "backend/orchestrator/src/aspire_orchestrator/config/schemas/**"
      - "backend/orchestrator/src/aspire_orchestrator/models.py"
      - "backend/plan/contracts/**"
      - "backend/plan/specs/ava-user/**"
      - "schemas/**"
  workflow_dispatch:

jobs:
  classify:
    name: Classify dependency domains
    runs-on: ubuntu-latest
    outputs:
      backend: ${{ steps.classify.outputs.backend }}
      admin_portal: ${{ steps.classify.outputs.admin_portal }}
      desktop: ${{ steps.classify.outputs.desktop }}
      shared_contracts: ${{ steps.classify.outputs.shared_contracts }}
      root_tooling: ${{ steps.classify.outputs.root_tooling }}
      dependency_files_touched: ${{ steps.classify.outputs.dependency_files_touched }}
      protected_backend_framework_changed: ${{ steps.classify.outputs.protected_backend_framework_changed }}
      cross_surface_required: ${{ steps.classify.outputs.cross_surface_required }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install parser dependency
        run: python -m pip install pyyaml

      - id: classify
        name: Evaluate dependency policy
        run: |
          python tools/ci/dependency_policy_check.py \
            "${{ github.event.pull_request.base.sha || github.sha }}" \
            "${{ github.event.pull_request.head.sha || github.sha }}"

      - name: Summarize changed domains
        run: |
          {
            echo "## Dependency Domain Classification"
            echo ""
            echo "- backend: ${{ steps.classify.outputs.backend }}"
            echo "- admin_portal: ${{ steps.classify.outputs.admin_portal }}"
            echo "- desktop: ${{ steps.classify.outputs.desktop }}"
            echo "- shared_contracts: ${{ steps.classify.outputs.shared_contracts }}"
            echo "- root_tooling: ${{ steps.classify.outputs.root_tooling }}"
            echo "- dependency_files_touched: ${{ steps.classify.outputs.dependency_files_touched }}"
            echo "- protected_backend_framework_changed: ${{ steps.classify.outputs.protected_backend_framework_changed }}"
          } >> "$GITHUB_STEP_SUMMARY"

  policy-audit:
    name: Policy audit
    runs-on: ubuntu-latest
    needs: classify
    if: needs.classify.outputs.dependency_files_touched == 'true' || needs.classify.outputs.root_tooling == 'true'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Validate dependency policy files
        run: |
          python - <<'PY'
          from pathlib import Path
          import yaml
          for rel in [".github/dependabot.yml", ".github/dependency-policy.yml"]:
              path = Path(rel)
              assert path.exists(), f"missing {rel}"
              yaml.safe_load(path.read_text(encoding="utf-8"))
          print("dependency policy files valid")
          PY

  backend-certification:
    name: Backend certification (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    needs: classify
    if: needs.classify.outputs.backend == 'true' || needs.classify.outputs.shared_contracts == 'true'
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.14"]
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v4
        with:
          python-version: ${{ matrix.python-version }}

      - name: Sync orchestrator environment
        working-directory: backend/orchestrator
        run: uv sync --extra dev

      - name: Validate/certify representative agents
        working-directory: backend/orchestrator
        run: |
          uv run --no-project python scripts/scaffold_agent.py validate --registry-id ava_user --manifest-id ava-user
          uv run --no-project python scripts/scaffold_agent.py certify --registry-id ava_user --manifest-id ava-user
          uv run --no-project python scripts/scaffold_agent.py validate --registry-id ava_admin --manifest-id ava-admin
          uv run --no-project python scripts/scaffold_agent.py certify --registry-id ava_admin --manifest-id ava-admin
          uv run --no-project python scripts/scaffold_agent.py validate --registry-id milo_payroll --manifest-id milo-payroll
          uv run --no-project python scripts/scaffold_agent.py certify --registry-id clara_legal --manifest-id clara-legal

      - name: Run backend certification slices
        working-directory: backend/orchestrator
        env:
          PYTHONPATH: src
        run: |
          uv run python -m pytest \
            tests/test_ava_user.py \
            tests/test_ava_admin.py \
            tests/test_ava_personas_and_contracts.py \
            tests/test_wave6_admin_ava.py \
            tests/test_internal_ops_activation.py \
            tests/test_agent_reason.py \
            tests/test_retrieval_router.py \
            tests/test_graph.py \
            tests/test_milo_payroll.py \
            tests/test_clara_legal.py \
            -q

  gateway-contracts:
    name: Gateway contracts
    runs-on: ubuntu-latest
    needs: classify
    if: needs.classify.outputs.backend == 'true' || needs.classify.outputs.shared_contracts == 'true'
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: backend/gateway/package-lock.json

      - name: Install gateway dependencies
        working-directory: backend/gateway
        run: npm ci

      - name: Build gateway
        working-directory: backend/gateway
        run: npm run build

      - name: Test gateway
        working-directory: backend/gateway
        run: npm test

  admin-portal-gate:
    name: Admin portal gate
    runs-on: ubuntu-latest
    needs: classify
    if: needs.classify.outputs.admin_portal == 'true' || needs.classify.outputs.shared_contracts == 'true'
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: Aspire/Aspire/package-lock.json

      - name: Install admin portal dependencies
        working-directory: Aspire/Aspire
        run: npm ci

      - name: Build admin portal
        working-directory: Aspire/Aspire
        run: npm run web:build

      - name: Lint admin portal
        working-directory: Aspire/Aspire
        run: npm run lint

  desktop-gate:
    name: Desktop gate
    runs-on: ubuntu-latest
    needs: classify
    if: needs.classify.outputs.desktop == 'true' || needs.classify.outputs.shared_contracts == 'true'
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: Aspire-desktop/package-lock.json

      - name: Install desktop dependencies
        working-directory: Aspire-desktop
        run: npm ci

      - name: Build desktop web bundle
        working-directory: Aspire-desktop
        run: npm run build

      - name: Lint desktop
        working-directory: Aspire-desktop
        run: npm run lint

  protected-framework-review:
    name: Protected framework review
    runs-on: ubuntu-latest
    needs: classify
    if: needs.classify.outputs.protected_backend_framework_changed == 'true'
    steps:
      - name: Require manual framework review label
        run: |
          labels='${{ join(github.event.pull_request.labels.*.name, ',') }}'
          echo "labels=$labels"
          if [[ "$labels" != *"framework-migration"* && "$labels" != *"framework-review"* ]]; then
            echo "Protected backend framework dependency changed."
            echo "Apply 'framework-migration' or 'framework-review' before merge."
            exit 1
          fi
