    tools: [tax.filing.submit]
    capability_scope: tax:file
    category: filings
    approval:
      type: legal
      binding_fields: [filing_type, tax_year, jurisdiction]
    redact_fields: [ssn, ein, tax_amount]

  # Payroll
  payroll.snapshot:
    risk_tier: green
    tools: [gusto.read_payrolls]
    capability_scope: payroll:snapshot
    category: payroll
    approval:
      type: none
    redact_fields: [employee_names, ssn]

  payroll.schedule:
    risk_tier: yellow
