    approval:
      type: none
    redact_fields: []

  # ──────────────────────────────────────────────
  # YELLOW tier — Requires explicit user confirmation
  # ──────────────────────────────────────────────

  # Telephony (Sarah Front Desk — call transfer)
  call.transfer:
    risk_tier: yellow
    tools: [twilio.call.create]
    capability_scope: call:transfer
    category: telephony
    approval:
      type: explicit
      binding_fields: [call_id, destination]
    redact_fields: [destination]

  # Email
  email.send:
    risk_tier: yellow
    tools: [polaris.email.send]
    capability_scope: comms:send_email
    category: communications
    approval:
      type: explicit
      binding_fields: [to, subject, template_id]
    params:
      required: [to, subject]
      constraints:
        to_regex: '^[^@\s]+@[^@\s]+\.[^@\s]+$'
        subject_max_len: 120
    redact_fields: [to, subject, body]

  email.draft:
    risk_tier: yellow
    tools: [polaris.email.draft]
    capability_scope: comms:draft_email
    category: communications
    approval:
      type: explicit
      binding_fields: [to, subject]
    redact_fields: [to, subject, body]

  # Calendar (write)
  calendar.create:
    risk_tier: yellow
    tools: [calendar.event.create]
    capability_scope: calendar:write
    category: calendar
    approval:
      type: explicit
      binding_fields: [title, start_time, attendees]
    redact_fields: [attendees]

  calendar.complete:
    risk_tier: yellow
    tools: [calendar.event.complete]
    capability_scope: calendar:write
    category: calendar
    approval:
      type: explicit
      binding_fields: [event_id]
    redact_fields: []

  # Invoice (draft creation is GREEN — no money moves, just a Stripe draft)
  # Sending the invoice (invoice.send) remains YELLOW — requires Authority Queue approval
  invoice.create:
    risk_tier: green
    tools: [stripe.invoice.create]
    capability_scope: invoicing:create
    category: invoicing
    approval:
      type: none
    params:
      required: [customer_id, amount]
    redact_fields: [customer_id]

  invoice.send:
    risk_tier: yellow
    tools: [stripe.invoice.send]
    capability_scope: invoicing:send
    category: invoicing
    approval:
      type: explicit
      binding_fields: [invoice_id]
    params:
