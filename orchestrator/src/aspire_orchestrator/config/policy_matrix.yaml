  # Email (read + triage — Eli Inbox pack)
  email.read:
    risk_tier: green
    tools: [polaris.email.read]
    capability_scope: email:read
    category: email
    approval:
      type: none
    redact_fields: [subject, body, from, to]

  email.triage:
    risk_tier: green
    tools: [internal.email.triage]
    capability_scope: email:triage
    category: email
    approval:
      type: none
    redact_fields: []

  # Telephony (Sarah Front Desk — call routing + visitor logging)
  call.route:
    risk_tier: green
    tools: [twilio.call.create]
    capability_scope: call:route
    category: telephony
    approval:
      type: none
