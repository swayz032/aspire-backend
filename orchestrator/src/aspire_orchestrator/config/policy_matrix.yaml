  finance.proposal.create:
    risk_tier: yellow
    tools: [finance.proposal.create]
    capability_scope: finance:proposal:create
    category: finance
    approval:
      type: explicit
      binding_fields: [action, inputs_hash, risk_tier]
    redact_fields: [account_numbers, ssn]

  a2a.create:
    risk_tier: yellow
    tools: [a2a.dispatch]
    capability_scope: a2a:create
    category: a2a
    approval:
      type: explicit
      binding_fields: [to_agent, request_type, inputs_hash]
    redact_fields: []

  # Bookkeeping
  books.sync:
    risk_tier: yellow
    tools: [quickbooks.sync]
    capability_scope: books:sync
    category: bookkeeping
    approval:
      type: explicit
    redact_fields: []

  books.categorize:
    risk_tier: green
    tools: [qbo.read_transactions]
    capability_scope: books:categorize
    category: bookkeeping
    approval:
      type: none
    redact_fields: []

  books.report:
    risk_tier: green
    tools: [qbo.read_accounts, qbo.read_transactions]
    capability_scope: books:report
    category: bookkeeping
    approval:
      type: none
    redact_fields: []

  books.journal_entry:
    risk_tier: yellow
    tools: [qbo.journal_entry.create]
    capability_scope: books:journal_entry
    category: bookkeeping
