  # ──────────────────────────────────────────────
  # RED tier — Requires authority + presence verification
  # ──────────────────────────────────────────────

  # Payments (discontinued — Moov removed, payment.transfer removed)
  # payment.send / payment.transfer / payment.owner_draw / payment.reconcile
  # are disabled until a new payment provider is integrated.

  # Contracts (sign — irreversible)
  contract.sign:
    risk_tier: red
    tools: [pandadoc.contract.sign]
    capability_scope: contracts:sign
    category: contracts
    approval:
      type: legal
      binding_fields: [contract_id, signer_name, signer_email]
      dual_approval: true
      required_approvers: [legal, business_owner]
    redact_fields: [signer_name, signer_email]

