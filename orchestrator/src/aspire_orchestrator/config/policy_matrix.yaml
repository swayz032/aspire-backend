  contract.generate:
    risk_tier: yellow
    tools: [pandadoc.contract.generate]
    capability_scope: contracts:generate
    category: contracts
    approval:
      type: explicit
      message: "Generate contract: {template_name} for {client_name}?"
      binding_fields: [template_type, parties]
    params:
      required: [template_type, parties]
    redact_fields: [party_names, address]

  # Contracts (send for signature — external communication)
  contract.send:
    risk_tier: yellow
    tools: [pandadoc.contract.send]
    capability_scope: contracts:send
    category: contracts
    approval:
      type: explicit
      binding_fields: [document_id, message]
    redact_fields: []

