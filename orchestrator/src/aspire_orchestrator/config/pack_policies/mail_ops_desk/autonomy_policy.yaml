default_mode: memory-assisted
actions:
  "domain.check":
    autonomy: guided
    binding_fields: [domain_name]

  "domain.verify":
    autonomy: guided
    binding_fields: [domain_name]

  "domain.dns.create":
    autonomy: approval-gated
    binding_fields: [domain_name, record_type, name, value]

  "domain.purchase":
    autonomy: approval-gated
    binding_fields: [domain_name, contact_email]

  "domain.delete":
    autonomy: approval-gated
    binding_fields: [domain_name]

  "mail.account.create":
    autonomy: approval-gated
    binding_fields: [domain_name, mailbox_name]

  "mail.account.read":
    autonomy: guided
    binding_fields: [email_address]
