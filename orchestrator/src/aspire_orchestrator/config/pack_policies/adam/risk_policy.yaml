# Adam Research — Risk Policy
# All operations are GREEN tier (read-only research)

pack_id: adam-research
default_risk_tier: green
max_risk_tier: green

actions:
  research.search:
    risk_tier: green
    approval_required: false
    description: "Web search for vendors, products, or services"

  research.places:
    risk_tier: green
    approval_required: false
    description: "Local business search via Google Places"

  research.image:
    risk_tier: green
    approval_required: false
    description: "Web image lookup for visual context in chat"

  research.compare:
    risk_tier: green
    approval_required: false
    description: "Multi-source vendor comparison"

  research.rfq:
    risk_tier: green
    approval_required: false
    description: "Generate Request for Quotation document"
