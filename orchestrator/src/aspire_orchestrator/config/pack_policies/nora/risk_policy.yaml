# Nora Conference — Risk Policy
# Room creation and summarization GREEN; scheduling YELLOW

pack_id: nora-conference
default_risk_tier: green
max_risk_tier: yellow

actions:
  meeting.create_room:
    risk_tier: green
    approval_required: false
    description: "Create conference session via Zoom Video SDK"

  meeting.schedule:
    risk_tier: yellow
    approval_required: true
    description: "Schedule meeting with participants (external communication)"

  meeting.summarize:
    risk_tier: green
    approval_required: false
    description: "Transcribe and summarize meeting (read-only)"
