# Finn Finance Manager — Risk Policy
# Strategic financial intelligence: snapshots, exceptions, proposals, delegation

pack_id: finn-finance-manager
default_risk_tier: yellow
max_risk_tier: yellow

actions:
  finance.snapshot.read:
    risk_tier: green
    approval_required: false
    description: "Read aggregated financial snapshot"

  finance.exceptions.read:
    risk_tier: green
    approval_required: false
    description: "Read active financial exceptions/alerts"

  finance.packet.draft:
    risk_tier: yellow
    approval_required: true
    description: "Draft a finance proposal packet"

  finance.proposal.create:
    risk_tier: yellow
    approval_required: true
    description: "Create a formal change proposal"

  a2a.create:
    risk_tier: yellow
    approval_required: true
    description: "Delegate analysis to another agent"
