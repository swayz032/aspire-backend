# Aspire Skill Pack Manifests — Runtime registry for orchestrator dispatch
# Per architecture.md: Control Plane Registry provides capability discovery
# Per CLAUDE.md Law #1: Only the orchestrator decides which skill pack handles a task
#
# Schema per skill pack:
#   id: unique identifier
#   name: human-readable name
#   owner: agent name
#   category: channel | finance | legal | internal_admin | internal
#   risk_tier: green | yellow | red (highest risk of any action)
#   status: registered | active | suspended
#   description: what this skill pack does
#   actions: list of action_types this skill pack handles (must exist in policy_matrix.yaml)
#   providers: external services used
#   capability_scopes: union of all capability scopes
#   tools: union of all tool identifiers
#   per_suite_enabled: whether per-suite enable/disable is supported
#
# Phase 1: All packs registered with status=registered (manifests only).
# Phase 2+: Status transitions to active as implementations are deployed.

version: "1.0.0"
updated_at: "2026-02-13"

defaults:
  per_suite_enabled: true
  max_concurrent_tasks: 10
  task_timeout_seconds: 300

