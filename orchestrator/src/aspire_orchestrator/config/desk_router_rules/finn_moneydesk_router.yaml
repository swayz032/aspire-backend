# Finn Money Desk routing rules
# Ported from ecosystem: platform/brain/router/rules/finn_moneydesk_router.yaml
# Frontend-internal agent: invoked by Ava; users do not chat Finn directly.
version: v2
rule_id: finn_moneydesk_router
agent: finn
channel: internal_frontend
match:
  any:
    - contains_any:
        values:
          - owner draw
          - personal transfer
          - pay myself
          - transfer to personal
          - draw
    - contains_any:
        values:
          - business transfer
          - move business money
          - transfer between accounts
          - move money
          - bank transfer
    - contains_any:
        values:
          - moov
          - plaid
route:
  agent: finn
  skillpack: finn-money-desk
scope:
  allowed_transfer_types: [business_transfer, owner_draw]
model_overrides:
  # Finn ALWAYS uses high_risk_guard for ALL decisions (RED tier)
  classify.high: high_risk_guard
  extract.high: high_risk_guard
  draft.high: high_risk_guard
  plan.high: high_risk_guard
  verify.high: high_risk_guard
  policy_check.high: high_risk_guard
  # Even medium risk gets high_risk_guard for money
  classify.medium: high_risk_guard
  plan.medium: high_risk_guard
notes:
  - Finn must only propose; execution happens via Ava approvals + gateway boundary.
  - v1 explicitly excludes refunds, tax-reserve automation, and vendor/AP automation.
