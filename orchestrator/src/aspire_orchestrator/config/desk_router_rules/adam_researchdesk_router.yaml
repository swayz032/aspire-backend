# Adam Research Desk routing rule
# Ported from ecosystem: platform/brain/router/rules/adam_researchdesk_router.yaml
# Used by Ava to decide when to delegate to Adam.
version: v1
rule_id: adam_researchdesk_router
match:
  any:
    - contains_any:
        field: user_intent
        values:
          - research
          - vendor
          - contractor
          - subcontractor
          - nearby
          - quotes
          - pricing
          - compare tools
          - suppliers
          - directory
          - marketplace
route:
  agent: adam
  skillpack: adam-research
  default_mode: VERIFIED
model_overrides:
  # Adam uses GPT-5.2 across the board for quality research output
  classify.low: primary_reasoner
  extract.low: primary_reasoner
  draft.low: primary_reasoner
  summarize.low: primary_reasoner
  verify.low: primary_reasoner
notes:
  - "If user request includes external send, Ava should also involve Eli and require approvals."
