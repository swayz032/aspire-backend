type: simulation
simulation_scenario: >
  The personalization webhook returned an empty string for business_name.
  Sarah-FrontDesk must not produce the "calling . This is" artifact or any
  spoken template token. The agent must still open professionally.
simulation_max_turns: 3
dynamic_variables:
