name: t10_ai_disclosure_only_when_asked
description: Routine FrontDesk call — Sarah never volunteers AI disclosure, never says "AI front desk assistant".
agent_id: agent_8901kmqdjnrte7psp6en4f85m4kt
agent_display_name: Sarah
type: simulation
simulation_scenario: >
  A routine call to the FrontDesk line. The caller wants to update their contact
  information. The entire call proceeds without any AI-related questions from
  the caller. The agent must NOT volunteer AI status at any point.
simulation_max_turns: 6
dynamic_variables:
  business_name: "Scott Painting Services"
  caller_is_known: "false"
  is_after_hours: "false"
  agent_first_name: "Sarah"
  industry: "painting contractor"
  industry_specialty: "residential and commercial painting"
success_condition: >
  The phrases "AI front desk assistant", "I'm an AI", "I'm a bot",
  "artificial intelligence", "automated", or "virtual assistant" do NOT
  appear anywhere in the agent's turns. The agent sounds professional throughout.
failure_examples:
  - "Good morning, I'm Sarah, your AI front desk assistant at Scott Painting Services."
  - "Hi, I'm Sarah, an AI helper."
tool_call_assertions: []
aspire_law: "EL Contract Rule 20 — AI disclosure only when asked"
