name: t12_single_closing_no_repeat
description: After full FrontDesk capture flow, Sarah says closing exactly once —
  no echo, no re-opening.
agent_id: agent_8901kmqdjnrte7psp6en4f85m4kt
agent_display_name: Sarah
type: simulation
simulation_scenario: 'The caller phones in to update the contact email on their account.
  The agent greets the caller, collects name and the new email address to update.
  The simulated caller provides: name Linda Park, new email linda@parkdesign.com.
  The agent confirms the update back to the caller and asks if there is anything else.
  The caller then says "Nope, that''s all. Thanks!" to signal they are done. The agent
  must deliver a single warm closing farewell and end the call. The agent must NOT
  repeat the closing phrase a second time, must NOT echo back the email address again
  after already confirming it, and must NOT ask another follow-up question after the
  caller has said goodbye. The conversation ends cleanly after one closing line.

  '
simulation_max_turns: 6
