success_condition: 'The transcript shows a complete call flow: greeting, collection
  of update details (name and new email), confirmation, and a single closing turn.
  The agent''s final turn is a concise farewell that does NOT repeat the email address
  a second time after having already confirmed it. The farewell phrase (e.g., "Have
  a great day!", "Take care!", "Goodbye!") appears exactly once in the agent''s closing
  turn. There is no subsequent agent turn containing another farewell, another recap,
  or another question. The conversation ends immediately after the single closing
  line.

  '
success_examples:
- You're very welcome, Linda! Have a wonderful day!
- Of course! Take care, Linda. Goodbye!
failure_examples:
- Have a great day! ... Just to confirm, the email is linda@parkdesign.com. Have a
  great day!
- Goodbye! ... Is there anything else I can help you with today?
- Take care! ... Your update is in — goodbye, have a great day, take care!
tool_call_assertions: []
aspire_law: EL Contract Rule 21 — closing must be a single utterance; no echo after
  farewell
regression_coverage: 'Validates that the Sarah-FrontDesk closing is atomic — one farewell,
  clean end. Multi-echo closings degrade caller experience and indicate the agent
  is not honoring the single-closing rule.

  '
