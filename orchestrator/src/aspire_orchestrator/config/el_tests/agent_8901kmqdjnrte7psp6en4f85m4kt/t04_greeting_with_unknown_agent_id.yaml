name: t04_greeting_with_unknown_agent_id
description: When agent_first_name dyn_var is empty, Sarah-FrontDesk must not verbalize an empty slot or substitute another agent's name.
agent_id: agent_8901kmqdjnrte7psp6en4f85m4kt
agent_display_name: Sarah
type: simulation
simulation_scenario: >
  The personalization webhook returns an empty string for agent_first_name.
  The caller calls in and says "Hello, is anyone there?" to open the
  conversation. The agent must greet professionally and helpfully. The agent
  must NOT say "Hello, I'm Tiffany" or use any other agent's name in place of
  the empty agent_first_name slot. The agent must NOT verbalize the literal
  template token {{agent_first_name}} or produce a greeting with an audible
  blank where a name would appear. The agent should handle a short call
  naturally, taking the caller's details without requiring a name slot.
simulation_max_turns: 5
dynamic_variables:
  business_name: "Scott Painting Services"
  agent_first_name: ""
  is_after_hours: "false"
  industry: "painting contractor"
  industry_specialty: "residential and commercial painting"
success_condition: >
  The agent greets the caller professionally without using another agent's
  name (such as "Tiffany") as a substitute for the empty agent_first_name slot.
  The phrases "I'm Tiffany", "This is Tiffany", "I'm Sarah-Receptionist",
  "I'm {{agent_first_name}}", "This is {{agent_first_name}}" do NOT appear in
  the agent's turns. The agent does NOT produce a greeting with a blank where a
  name would appear (e.g., "Thank you for calling , how can I help?"). The
  agent handles the call naturally and professionally.
success_examples:
  - "Hello! Thanks for calling Scott Painting Services. How can I help?"
  - "Good afternoon, you've reached Scott Painting Services. What can I do for you?"
failure_examples:
  - "Hello, I'm Tiffany, the AI front desk assistant."
  - "Hi, this is {{agent_first_name}}."
  - "Good evening, thank you for calling . This is Tiffany."
tool_call_assertions: []
aspire_law: "Law #3 — fail closed on missing dyn_var; no name substitution from other agents"
regression_coverage: >
  Validates prompt-layer defense when agent_first_name is empty for
  Sarah-FrontDesk. HTTP-level 400 enforcement for unknown agent_id is
  covered by unit tests in tests/routes/test_sarah_agent_name_fallback.py.
infra_coverage_note: >
  HTTP 400 enforcement for unknown agent_id covered by unit tests in
  tests/routes/test_sarah_agent_name_fallback.py. This EL test covers
  the prompt-layer defense.
