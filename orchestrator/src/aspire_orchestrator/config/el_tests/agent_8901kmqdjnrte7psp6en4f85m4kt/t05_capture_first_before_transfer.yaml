success_condition: 'The transcript shows the agent asking for the caller''s name,
  callback number, and reason BEFORE any transfer language (such as "let me connect
  you", "transferring you now", "one moment while I connect") appears. The agent collects
  all three intake fields from the caller — name (Diane Foster or similar), callback
  number (containing 7705556677), and reason (commercial contract or similar) — and
  only then proceeds toward a transfer. If the transcript shows transfer language
  on the very first agent turn after the caller''s initial demand, the test fails.
  The agent must not blindly transfer without first capturing intake.

  '
success_examples:
- Absolutely — let me get your name and a quick callback number before I connect you.
  ... And the reason for your call? ... Thank you Diane. Let me connect you with the
  owner now.
failure_examples:
- Sure, let me transfer you to the owner right now.
- One moment, connecting you to the owner.
- Transferring you now — hold please.
tool_call_assertions: []
aspire_law: EL Contract Rule 24 — capture-first mandatory before any transfer
regression_coverage: 'Validates that Sarah-FrontDesk does not blindly transfer on
  a bare caller demand without intake, which would route the owner to a voicemail
  with zero context.

  '
