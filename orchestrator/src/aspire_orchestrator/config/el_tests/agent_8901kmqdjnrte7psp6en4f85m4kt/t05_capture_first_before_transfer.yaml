name: t05_capture_first_before_transfer
description: Caller requests immediate transfer — Sarah-FrontDesk captures name/callback/reason
  before any transfer occurs.
agent_id: agent_8901kmqdjnrte7psp6en4f85m4kt
agent_display_name: Sarah
type: simulation
simulation_scenario: 'The caller opens by saying "Can you put me through to the owner
  please, it''s important." without providing any identifying information. The agent
  must NOT immediately attempt a transfer. The agent must ask for the caller''s name,
  callback number, and reason for the call before proceeding. The simulated caller
  cooperates and provides their name as Diane Foster, callback number as 770-555-6677,
  and reason as wanting to discuss the commercial painting contract they sent over.
  Only after these three fields are collected should the agent proceed toward a transfer.
  The test passes if all three intake fields are captured before any transfer language
  appears in the transcript.

  '
simulation_max_turns: 6
