success_condition: 'The agent offers to schedule an estimate or consultation — NOT
  a "service call" or "dispatch". The agent captures project type, address/location,
  and callback number. The word "estimate" or "consultation" appears at least once.
  The agent never says "service call", "dispatch", "technician", or "HVAC" in this
  context.

  '
success_examples:
- We'd love to give you a free estimate! Can I get your property address and a callback
  number for our team?
failure_examples:
- I'll have a technician dispatched to your location.
- Let me schedule a service call for you.
- What's your heating system type?
tool_call_assertions:
- tool_name: capture_message
  expected_called: true
aspire_law: EL Contract Rule 26 — trade-aware vocabulary
