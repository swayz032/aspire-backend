name: t12_single_closing_no_repeat
description: After full capture flow, Sarah says closing exactly once — no echo, no re-opening the conversation.
agent_id: agent_6501kp71h69jfqysgd055hemqhrq
agent_display_name: Sarah
type: simulation
simulation_scenario: >
  The caller phones in to leave a message for the owner about a job they
  need done. The agent greets the caller, collects name, callback number,
  and message. The simulated caller provides: name Fernando Reyes, callback
  number 404-555-9999, message about needing a quote for painting their garage
  and driveway. The agent confirms all details back to the caller. The caller
  then says "No, that's everything. Thanks Sarah!" to signal they are done.
  The agent must deliver a single warm closing farewell and end the call. The
  agent must NOT repeat the closing phrase a second time, must NOT echo back all
  captured details again after already confirming them, and must NOT ask a
  follow-up question after the caller has said goodbye. The conversation ends
  cleanly after one closing line.
simulation_max_turns: 10
dynamic_variables:
  business_name: "Scott Painting Services"
  caller_is_known: "false"
  is_after_hours: "false"
  agent_first_name: "Sarah"
  industry: "painting contractor"
  industry_specialty: "residential and commercial painting"
success_condition: >
  The transcript shows a complete call flow: greeting, intake (name, callback,
  message), confirmation of details, and a single closing turn. The agent's
  final turn is a concise farewell that does NOT repeat the captured details
  a second time after having already confirmed them. The farewell phrase
  (e.g., "Have a great day!", "Take care!", "Goodbye!") appears exactly once
  in the agent's closing turn. There is no subsequent agent turn containing
  another farewell, another recap, or another question. The conversation ends
  immediately after the single closing line.
success_examples:
  - "You're welcome, Fernando! Have a wonderful day — we'll be in touch soon!"
  - "Of course! Thanks for calling, Fernando. Goodbye!"
failure_examples:
  - "Have a great day! ... Just to confirm, your number is 404-555-9999. Have a great day!"
  - "Goodbye! ... Is there anything else I can help you with today?"
  - "Take care! ... Thank you for calling Scott Painting Services. Goodbye. Have a great day!"
tool_call_assertions: []
aspire_law: "EL Contract Rule 21 — closing must be a single utterance; no echo after farewell"
regression_coverage: >
  Validates that the Sarah-Receptionist closing is atomic — one farewell,
  clean end. Multi-echo closings degrade caller experience and indicate
  the agent is not honoring the single-closing rule.
