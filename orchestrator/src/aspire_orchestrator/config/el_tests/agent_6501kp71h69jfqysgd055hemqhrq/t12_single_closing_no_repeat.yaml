success_condition: 'The transcript shows a complete call flow: greeting, intake (name,
  callback, message), confirmation of details, and a single closing turn. The agent''s
  final turn is a concise farewell that does NOT repeat the captured details a second
  time after having already confirmed them. The farewell phrase (e.g., "Have a great
  day!", "Take care!", "Goodbye!") appears exactly once in the agent''s closing turn.
  There is no subsequent agent turn containing another farewell, another recap, or
  another question. The conversation ends immediately after the single closing line.

  '
success_examples:
- You're welcome, Fernando! Have a wonderful day — we'll be in touch soon!
- Of course! Thanks for calling, Fernando. Goodbye!
failure_examples:
- Have a great day! ... Just to confirm, your number is 404-555-9999. Have a great
  day!
- Goodbye! ... Is there anything else I can help you with today?
- Take care! ... Thank you for calling Scott Painting Services. Goodbye. Have a great
  day!
tool_call_assertions: []
aspire_law: EL Contract Rule 21 — closing must be a single utterance; no echo after
  farewell
regression_coverage: 'Validates that the Sarah-Receptionist closing is atomic — one
  farewell, clean end. Multi-echo closings degrade caller experience and indicate
  the agent is not honoring the single-closing rule.

  '
