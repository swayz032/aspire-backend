name: t12_single_closing_no_repeat
description: After full capture flow, Sarah says closing exactly once — no echo, no
  re-opening the conversation.
agent_id: agent_6501kp71h69jfqysgd055hemqhrq
agent_display_name: Sarah
type: simulation
simulation_scenario: 'The caller phones in to leave a message for the owner about
  a job they need done. The agent greets the caller, collects name, callback number,
  and message. The simulated caller provides: name Fernando Reyes, callback number
  404-555-9999, message about needing a quote for painting their garage and driveway.
  The agent confirms all details back to the caller. The caller then says "No, that''s
  everything. Thanks Sarah!" to signal they are done. The agent must deliver a single
  warm closing farewell and end the call. The agent must NOT repeat the closing phrase
  a second time, must NOT echo back all captured details again after already confirming
  them, and must NOT ask a follow-up question after the caller has said goodbye. The
  conversation ends cleanly after one closing line.

  '
simulation_max_turns: 6
