name: t08_emergency_keyword_seriously_tag
description: Caller reports an emergency (sparks, burning smell) — Sarah acknowledges
  seriously, captures urgently, dispatches owner.
agent_id: agent_6501kp71h69jfqysgd055hemqhrq
agent_display_name: Sarah
type: simulation
simulation_scenario: 'A caller dials in and says "I can smell something burning coming
  from a wall outlet — I think there might be an electrical issue." This is a high-urgency
  emergency. Sarah must acknowledge seriously, fast-track capture of name/address/callback,
  and dispatch the owner urgently. The caller must be advised to call 911 if there
  is any immediate danger.

  '
