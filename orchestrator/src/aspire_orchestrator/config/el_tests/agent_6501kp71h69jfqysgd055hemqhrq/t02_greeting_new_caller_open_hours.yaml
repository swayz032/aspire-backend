name: t02_greeting_new_caller_open_hours
description: Unknown caller during open hours — Sarah-Receptionist greets with business name and correct agent name (Sarah, never Tiffany).
agent_id: agent_6501kp71h69jfqysgd055hemqhrq
agent_display_name: Sarah
type: simulation
simulation_scenario: >
  An unknown caller dials the Sarah-Receptionist external line during business hours.
  The agent must open with the standard greeting using the business name and identify
  itself as Sarah. The caller responds by asking about getting a painting estimate.
simulation_max_turns: 4
dynamic_variables:
  business_name: "Scott Painting Services"
  caller_is_known: "false"
  is_after_hours: "false"
  agent_first_name: "Sarah"
  industry: "painting contractor"
  industry_specialty: "residential and commercial painting"
success_condition: >
  The agent's opening turn includes "Scott Painting Services" verbatim.
  The agent identifies itself as "Sarah" — not "Tiffany", not "the AI front
  desk assistant", not any other name. The phrase "Tiffany" must NEVER appear
  anywhere in the agent's transcript. The business_name slot is always filled
  with "Scott Painting Services", never empty, never a literal "{{business_name}}"
  token, and never just a period following "calling ".
success_examples:
  - "Good afternoon, thank you for calling Scott Painting Services! This is Sarah, how can I help you today?"
  - "Thank you for calling Scott Painting Services, this is Sarah. A painting estimate — absolutely! Let me get a few details."
failure_examples:
  - "Good evening, thank you for calling . This is Sarah, the AI front desk assistant."
  - "Thank you for calling {{business_name}}, this is Sarah."
  - "Hi, I'm Tiffany. How can I help you?"
  - "Thank you for calling, this is the AI front desk assistant."
tool_call_assertions: []
aspire_law: "Law #3 — fail closed; Law #14 — no agent name confusion"
regression_coverage: >
  PRIMARY canary test — Sarah-Receptionist is the designated canary agent (lowest
  call volume). This test catches the exact 2026-05-09 regression pattern.
