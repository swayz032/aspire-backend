name: t05_capture_first_before_transfer
description: Caller demands immediate transfer without providing name/callback/reason — Sarah captures all three fields before any transfer occurs.
agent_id: agent_6501kp71h69jfqysgd055hemqhrq
agent_display_name: Sarah
type: simulation
simulation_scenario: >
  The caller opens by saying "Can you transfer me to the owner right away?"
  without providing any identifying information. The agent must NOT immediately
  attempt a transfer. The agent must ask for the caller's name, callback
  number, and reason for the call before proceeding. The simulated caller
  cooperates and provides their name as Carlos Mendez, callback number as
  404-555-7788, and reason as wanting to discuss the fence painting job
  scheduled for Monday. Only after these three fields are collected should
  the agent proceed toward a transfer. The test passes if all three intake
  fields are captured before any transfer language appears in the transcript.
simulation_max_turns: 8
dynamic_variables:
  business_name: "Scott Painting Services"
  caller_is_known: "false"
  is_after_hours: "false"
  agent_first_name: "Sarah"
  routing_owner_phone: "+14045550001"
  industry: "painting contractor"
  industry_specialty: "residential and commercial painting"
success_condition: >
  The transcript shows the agent asking for the caller's name, callback number,
  and reason BEFORE any transfer language (such as "let me connect you",
  "transferring you now", "one moment while I connect") appears. The agent
  collects all three intake fields from the caller — name (Carlos Mendez or
  similar), callback number (containing 4045557788), and reason (fence painting
  job or similar) — and only then proceeds toward a transfer. If the transcript
  shows transfer language on the very first agent turn after the caller's initial
  demand, the test fails. The agent must not blindly transfer without first
  capturing intake.
success_examples:
  - "Of course! Before I connect you, may I get your name and a good callback number in case we get disconnected? ... And what's the reason for your call? ... Thank you Carlos. Let me connect you with the owner now."
failure_examples:
  - "Sure, let me transfer you to the owner right now."
  - "One moment, connecting you to the owner."
  - "Transferring you now — hold please."
tool_call_assertions: []
aspire_law: "EL Contract Rule 24 — capture-first mandatory before any transfer"
regression_coverage: >
  Validates that Sarah does not blindly transfer on a bare caller demand
  without intake, which would route the owner to a voicemail with zero context.
