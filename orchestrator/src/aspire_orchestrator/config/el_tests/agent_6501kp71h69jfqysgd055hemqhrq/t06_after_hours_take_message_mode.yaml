success_condition: 'The agent correctly handles the after-hours take_message mode.
  The transcript must NOT contain any transfer language such as "let me connect you",
  "let me transfer you", "I''ll connect you with the owner", or "one moment while
  I try to reach". The agent acknowledges being after hours (or that the team is unavailable),
  offers to take a message, and captures the caller''s name, callback number, and
  reason before ending the call cleanly. The call ends with the caller''s details
  recorded and a promise to relay the message.

  '
success_examples:
- Thanks for calling Scott Painting Services! Unfortunately our office is closed right
  now, but I'd be happy to take a message. May I get your name and the best number
  to reach you?
- It looks like we're outside of business hours. I can take down your information
  and make sure someone calls you back. What's your name?
failure_examples:
- Let me try to connect you with the owner.
- One moment while I transfer you to the team.
- I'll transfer you now and hope someone picks up.
tool_call_assertions: []
aspire_law: EL Contract Rule 24 — after_hours_mode must be honored; take_message branch
  is transfer-free
regression_coverage: 'Verifies that after_hours_mode=take_message is strictly honored
  at the conversation layer — Sarah must not attempt a transfer in this mode.

  '
