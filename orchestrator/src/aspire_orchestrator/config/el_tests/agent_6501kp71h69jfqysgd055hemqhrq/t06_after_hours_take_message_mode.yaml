name: t06_after_hours_take_message_mode
description: after_hours_mode=take_message — Sarah goes directly to capture, NOT transfer.
agent_id: agent_6501kp71h69jfqysgd055hemqhrq
agent_display_name: Sarah
type: simulation
simulation_scenario: 'The caller phones in after business hours when is_after_hours
  is true and after_hours_mode is set to "take_message". The caller says they are
  hoping to get a quote for some painting work. Because the mode is take_message,
  the agent must acknowledge the office is currently unavailable and must NOT attempt
  to transfer the caller to the owner. The agent should offer to take a message and
  capture the caller''s name, callback number, and reason for calling. The simulated
  caller provides their name as Jordan Ellis, callback number as 678-555-0044, and
  message about wanting an estimate for exterior painting. The test verifies that
  no transfer is attempted and that message capture is completed.

  '
simulation_max_turns: 8
