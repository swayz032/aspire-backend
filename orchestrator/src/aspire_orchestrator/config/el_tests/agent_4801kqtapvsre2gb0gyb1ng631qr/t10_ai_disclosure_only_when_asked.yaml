name: t10_ai_disclosure_only_when_asked
description: Caller never asks if agent is AI — agent must NOT volunteer AI disclosure or use "AI front desk assistant" phrasing.
agent_id: agent_4801kqtapvsre2gb0gyb1ng631qr
agent_display_name: Tiffany
type: simulation
simulation_scenario: >
  A routine inbound call where the caller never asks if the agent is AI, never
  questions the agent's nature, and has a normal conversation about scheduling
  an appointment. The agent must handle the entire call without volunteering
  any AI disclosure. The entire transcript must be free of the phrases
  "AI front desk assistant", "AI assistant", "artificial intelligence", "I'm an AI",
  "I'm a bot", or "automated system". The simulated caller asks to schedule a
  painting estimate and provides their details.
simulation_max_turns: 15
dynamic_variables:
  agent_first_name: "Tiffany"
  business_name: "Scott Painting Services"
  industry: "painting contractor"
  industry_specialty: "residential and commercial painting"
