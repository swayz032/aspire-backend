success_condition: >
  Given is_after_hours=true and after_hours_mode=try_transfer_then_message, did the agent show a two-phase flow?
  1. Did the agent attempt transfer_to_number with routing_owner_phone parameter in the first phase?
  2. Did the agent fall back to capture_message (or message capture language) after the transfer was simulated as no-answer?
  3. Did the agent capture name and callback number as part of the message capture fallback?
  Return True if all 3 met in order (transfer attempt THEN message capture). Return False if the agent skipped directly to message capture without attempting a transfer first, or abandoned the call without offering to take a message.
success_examples:
  - "Let me try to reach the owner for you — one moment please. ... I'm sorry, it seems the owner isn't available right now. I'll take a message and make sure they call you back. Can I get your name and number?"
  - "Since it's after hours, I'll try connecting you with the owner. ... Unfortunately, the owner isn't picking up. Let me take down your information so they can follow up with you."
failure_examples:
  - "I'll take a message for you."
  - "Let me transfer you — have a great day!"
  - "The office is closed. Goodbye."
tool_call_assertions: []
aspire_law: "EL Contract Rule 24 — correct two-step after_hours branch: try_transfer then capture"
regression_coverage: >
  Validates the try_transfer_then_message flow executes both steps in order.
  A regression where only the first or second step fires would break the
  caller experience in urgent after-hours scenarios.
