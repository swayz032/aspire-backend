name: t07_after_hours_try_transfer_then_message
description: after_hours_mode=try_transfer_then_message — agent attempts transfer first, then falls back to capture_message when no answer.
agent_id: agent_4801kqtapvsre2gb0gyb1ng631qr
agent_display_name: Tiffany
type: simulation
simulation_scenario: >
  The caller phones after hours when is_after_hours is true and
  after_hours_mode is set to "try_transfer_then_message". The caller says
  they have an urgent question about a job completed last month. The agent
  must first collect the caller's name and callback number, then attempt to
  transfer the caller to the routing_owner_phone. The simulator simulates a
  no-answer on the transfer attempt. After the failed transfer (no answer),
  the agent must fall back to taking a message — capturing the caller's
  details and reason before ending the call. The simulated caller provides
  their name as Dana Kowalski, callback number as 770-555-4321, and reason
  as an urgent question about a recent job. The test verifies the two-step
  try-then-fallback flow is executed in the correct order.
simulation_max_turns: 15
dynamic_variables:
  agent_first_name: "Tiffany"
  business_name: "Scott Painting Services"
  industry: "painting contractor"
  industry_specialty: "residential and commercial painting"
  time_of_day: "morning"
  is_open_now: "false"
  is_after_hours: "true"
  after_hours_mode: "try_transfer_then_message"
  busy_mode: "take_message"
  catch_mode: "APP_AND_PHONE_SIMUL_RING"
  public_number_mode: "ASPIRE_NEW_NUMBER"
  greeting_name_override: ""
  pronunciation_override: ""
  owner_title: "Mr."
  owner_formal_name: "Mr. Scott"
  business_city: ""
  business_state: ""
  routing_owner_phone: "+17705550001"
  routing_sales_phone: "+18503666647"
  routing_support_phone: "+18503666647"
  routing_billing_phone: "+18503666647"
  routing_scheduling_phone: "+18503666647"
  routing_owner_name: "Tonio Scott"
  routing_sales_name: "Tonio Scott"
  routing_support_name: "Tonio Scott"
  routing_billing_name: "Tonio Scott"
  routing_scheduling_name: "Tonio Scott"
  routing_contacts_summary: "Owner: Tonio Scott"
  configured_roles: "owner,sales,support,billing,scheduling"
  caller_first_name: ""
  caller_last_name: ""
  caller_is_known: "false"
  caller_display_name: ""
