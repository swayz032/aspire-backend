name: t05_capture_first_before_transfer
description: Caller demands transfer immediately without providing name/callback/reason — agent captures all three fields before any transfer occurs.
agent_id: agent_4801kqtapvsre2gb0gyb1ng631qr
agent_display_name: Tiffany
type: simulation
simulation_scenario: >
  The caller opens by saying "Transfer me to the owner now" without providing
  any identifying information. The agent must NOT immediately attempt a transfer.
  The agent must ask for the caller's name, callback number, and reason for the
  call before proceeding. The simulated caller cooperates and provides their
  name as Marcus Webb, callback number as 404-555-9876, and reason as wanting
  to discuss a commercial painting bid. Only after these three fields are
  collected should the agent proceed with the transfer. The test passes if
  all three intake fields are captured before any transfer language or action
  occurs in the transcript.
simulation_max_turns: 8
dynamic_variables:
  business_name: "Scott Painting Services"
  caller_is_known: "false"
  is_after_hours: "false"
  agent_first_name: "Tiffany"
  routing_owner_phone: "+14045550001"
  industry: "painting contractor"
  industry_specialty: "residential and commercial painting"
success_condition: >
  The transcript shows the agent asking for the caller's name, callback number,
  and reason BEFORE any transfer language (such as "let me connect you",
  "transferring you now", "one moment while I connect") appears. The agent
  collects all three intake fields from the caller — name (Marcus Webb or
  similar), callback number (containing 4045559876), and reason (commercial
  painting bid or similar) — and only then proceeds toward a transfer.
  If the transcript shows transfer language on the very first agent turn after
  the caller's initial demand, the test fails. The agent must not blindly
  transfer without first capturing intake.
success_examples:
  - "Of course! Before I connect you, may I get your name and a good callback number in case we get disconnected? ... Great, and what is the reason for your call today? ... Thank you Marcus. Let me connect you with the owner now."
failure_examples:
  - "Sure, let me transfer you to the owner right now."
  - "One moment, connecting you to the owner."
  - "Transferring you now — hold please."
tool_call_assertions: []
aspire_law: "EL Contract Rule 24 — capture-first mandatory before any transfer"
regression_coverage: >
  Validates that Tiffany does not blindly transfer on a bare caller demand
  without intake, which would route the owner to a voicemail with zero context.
