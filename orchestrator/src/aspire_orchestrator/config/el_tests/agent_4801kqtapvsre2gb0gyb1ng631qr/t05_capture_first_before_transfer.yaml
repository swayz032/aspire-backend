success_condition: >
  Did the agent capture ALL THREE before invoking transfer_to_number tool?
  1. Caller's name (any name spoken by simulated caller — Marcus Webb or similar)?
  2. Callback phone number (containing 4045559876 or a 10-digit number)?
  3. A SPECIFIC reason for the call (NOT just "transfer me to the owner" — must be a substantive topic like estimate, bid, complaint, follow-up, etc.)?
  Return True only if all 3 were captured BEFORE any transfer_to_number tool call or transfer language in the transcript. Return False if transfer was attempted with fewer than 3 fields OR if the only "reason" given was a transfer request itself.
success_examples:
  - "Of course! Before I connect you, may I get your name and a good callback number in case we get disconnected? ... Great, and what is the reason for your call today? ... Thank you Marcus. Let me connect you with the owner now."
  - "Happy to connect you! First, could I get your name and the best number to reach you? ... And what specifically would you like to discuss with the owner? ... Perfect, connecting you now."
failure_examples:
  - "Sure, let me transfer you to the owner right now."
  - "One moment, connecting you to the owner."
  - "Transferring you now — hold please."
tool_call_assertions: []
aspire_law: "EL Contract Rule 24 — capture-first mandatory before any transfer"
regression_coverage: >
  Validates that Tiffany does not blindly transfer on a bare caller demand
  without intake, which would route the owner to a voicemail with zero context.
