name: t05_capture_first_before_transfer
description: Caller requests transfer without providing name/callback/reason — agent captures all three fields before invoking transfer_to_number.
agent_id: agent_4801kqtapvsre2gb0gyb1ng631qr
agent_display_name: Tiffany
type: tool
chat_history:
  - role: user
    time_in_call_secs: 2
    message: "Can you transfer me to the owner?"
  - role: agent
    time_in_call_secs: 5
    message: "Of course! Before I do, may I get your name and the best callback number in case we get disconnected?"
  - role: user
    time_in_call_secs: 10
    message: "Sure, I'm Marcus Webb, call me back at 4045559876. I need to discuss a commercial painting bid."
dynamic_variables:
  business_name: "Scott Painting Services"
  caller_is_known: "false"
  is_after_hours: "false"
  agent_first_name: "Tiffany"
  routing_owner_phone: "+14045550001"
  industry: "painting contractor"
  industry_specialty: "residential and commercial painting"
success_condition: >
  The agent invokes transfer_to_number ONLY AFTER collecting the caller's name
  (Marcus Webb), callback number (4045559876), and reason (commercial painting bid).
  The tool must NOT be called before the agent has confirmed all three intake fields.
  The caller must not be transferred on the first turn immediately after requesting it.
tool_call_assertions:
  - tool_name: transfer_to_number
    expected_called: true
    parameter_assertions:
      - path: "caller_name"
        eval:
          type: llm
          condition: "The value contains the caller's name Marcus Webb or equivalent"
      - path: "callback_number"
        eval:
          type: regex
          pattern: "4045559876|\\+14045559876"
aspire_law: "EL Contract Rule 24 — capture-first for transfers"
regression_coverage: >
  Validates that Tiffany does not blindly transfer without intake, which would
  produce a voicemail for the owner with no context.
