success_condition: >
  Given is_after_hours=true and after_hours_mode=take_message, did the agent:
  1. Acknowledge being closed or after-hours in its first or second turn?
  2. NOT attempt transfer_to_number tool call at any point in the conversation?
  3. Attempt capture_message tool call OR ask for name and callback number as part of message capture flow?
  Return True if all 3 met. Return False if a transfer attempt occurred or if after-hours status was never acknowledged.
success_examples:
  - "Thanks for calling Scott Painting Services! Unfortunately, our office is closed at the moment, but I'd be happy to take a message for the team. May I get your name and the best number to reach you?"
  - "It looks like we're outside of business hours right now. I can take down your information and make sure someone calls you back. What's your name?"
failure_examples:
  - "Let me try to connect you with the owner."
  - "One moment while I transfer you to the team."
  - "I'll transfer you now and hope someone picks up."
tool_call_assertions: []
aspire_law: "EL Contract Rule 24 — after_hours_mode must be honored; take_message branch is transfer-free"
regression_coverage: >
  Verifies that after_hours_mode=take_message is strictly honored at the
  conversation layer — the agent must not call transfer_to_number in this mode.
