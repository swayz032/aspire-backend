name: t06_after_hours_take_message_mode
description: after_hours_mode=take_message — agent must go directly to capture, NOT attempt transfer.
agent_id: agent_4801kqtapvsre2gb0gyb1ng631qr
agent_display_name: Tiffany
type: tool
chat_history:
  - role: user
    time_in_call_secs: 2
    message: "Hi, I was hoping to speak with someone about scheduling a job."
dynamic_variables:
  business_name: "Scott Painting Services"
  caller_is_known: "false"
  is_after_hours: "true"
  after_hours_mode: "take_message"
  agent_first_name: "Tiffany"
  industry: "painting contractor"
  industry_specialty: "residential and commercial painting"
success_condition: >
  The agent acknowledges that the office is currently closed (or unavailable),
  then offers to take a message or capture the caller's details. The agent does
  NOT attempt to transfer the caller to the owner. The transfer_to_number tool
  is NOT called in this scenario. The agent captures the caller's name, callback
  number, and message before ending the call.
tool_call_assertions:
  - tool_name: transfer_to_number
    expected_called: false
  - tool_name: capture_message
    expected_called: true
aspire_law: "EL Contract Rule 24 — correct branch logic; Law #3 — fail closed on mode"
regression_coverage: >
  Verifies after_hours_mode is honored — agent must not call transfer_to_number
  when mode explicitly says take_message.
