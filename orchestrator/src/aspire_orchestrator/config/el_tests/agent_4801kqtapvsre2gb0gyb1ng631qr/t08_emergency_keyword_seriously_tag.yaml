name: t08_emergency_keyword_seriously_tag
description: Caller reports emergency (gas leak) — agent acknowledges seriously, captures details urgently, dispatches owner.
agent_id: agent_4801kqtapvsre2gb0gyb1ng631qr
agent_display_name: Tiffany
type: simulation
simulation_scenario: >
  A caller dials in and immediately says there is a gas leak. This is a high-urgency
  emergency scenario. The agent must treat this with maximum seriousness: acknowledge
  the emergency, recommend calling 911 or the gas company if at immediate risk,
  capture the caller's name and callback number, and dispatch the owner immediately.
  The agent must NOT fall into routine callback-window scheduling. The agent must
  NOT suggest waiting for a normal business callback. The simulated caller provides
  name as Chris Navarro and callback as 305-555-7890.
simulation_max_turns: 15
