name: t12_single_closing_no_repeat
description: After a full capture flow, agent says closing line exactly once with no echo, no repeat, and no follow-up question after the caller says goodbye.
agent_id: agent_4801kqtapvsre2gb0gyb1ng631qr
agent_display_name: Tiffany
type: simulation
simulation_scenario: >
  The caller phones in to leave a message for the owner. The agent greets
  the caller, collects name, callback number, and message. The simulated
  caller provides: name Priya Nair, callback number 678-555-2233, message
  about following up on an interior painting quote from last week. The agent
  confirms all details back to the caller. The caller then says "No, that's
  all. Thank you." to signal they are done. The agent must deliver a single
  warm closing farewell and end the call. The agent must NOT repeat the
  closing phrase a second time, must NOT echo back all the captured details
  again after already confirming them, and must NOT ask a follow-up question
  after the caller has said goodbye. The conversation ends cleanly after one
  closing line.
simulation_max_turns: 10
dynamic_variables:
  business_name: "Scott Painting Services"
  caller_is_known: "false"
  is_after_hours: "false"
  agent_first_name: "Tiffany"
  industry: "painting contractor"
  industry_specialty: "residential and commercial painting"
success_condition: >
  The transcript shows a complete call flow: greeting, intake (name, callback,
  message), confirmation of details, and a single closing turn. The agent's
  final turn is a concise farewell that does NOT repeat the captured details
  a second time after having already confirmed them. The farewell phrase
  (e.g., "Have a great day!", "Take care!", "Goodbye!") appears exactly once
  in the agent's closing turn. There is no subsequent agent turn containing
  another farewell, another recap, or another question. The conversation ends
  immediately after the single closing line.
success_examples:
  - "Wonderful! Have a great rest of your day, Priya. We'll be in touch soon!"
  - "Thank you for calling, Priya. Take care and goodbye!"
failure_examples:
  - "Have a great day! ... And just to confirm, your name is Priya and your number is 678-555-2233. Have a great day!"
  - "Goodbye! ... Is there anything else I can help you with today?"
  - "Take care! ... Thank you for calling Scott Painting Services. Goodbye. Have a great day. Take care!"
tool_call_assertions: []
aspire_law: "EL Contract Rule 21 — closing must be a single utterance; no echo after farewell"
regression_coverage: >
  Validates that the agent closing is atomic — one farewell, clean end.
  Multi-echo closings degrade caller experience and indicate the agent is
  not honoring the single-closing rule.
