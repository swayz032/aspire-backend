name: t12_single_closing_no_repeat
description: After a full capture flow, agent says closing line exactly once with no echo, no repeat, and no follow-up question after the caller says goodbye.
agent_id: agent_4801kqtapvsre2gb0gyb1ng631qr
agent_display_name: Tiffany
type: simulation
simulation_scenario: >
  The caller phones in to leave a message for the owner. The agent greets
  the caller, collects name, callback number, and message. The simulated
  caller provides: name Priya Nair, callback number 678-555-2233, message
  about following up on an interior painting quote from last week. The agent
  confirms all details back to the caller. The caller then says "No, that's
  all. Thank you." to signal they are done. The agent must deliver a single
  warm closing farewell and end the call. The agent must NOT repeat the
  closing phrase a second time, must NOT echo back all the captured details
  again after already confirming them, and must NOT ask a follow-up question
  after the caller has said goodbye. The conversation ends cleanly after one
  closing line.
simulation_max_turns: 15
