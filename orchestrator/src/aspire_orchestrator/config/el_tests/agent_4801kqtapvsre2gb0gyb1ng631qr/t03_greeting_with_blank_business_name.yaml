name: t03_greeting_with_blank_business_name
description: Webhook returns business_name="" — agent must NOT speak an empty slot; fallback phrasing required.
agent_id: agent_4801kqtapvsre2gb0gyb1ng631qr
agent_display_name: Tiffany
type: simulation
simulation_scenario: >
  The personalization webhook returned an empty string for business_name.
  The agent must open the call without producing the artifact "calling . This is"
  or any spoken empty slot. An acceptable fallback is to greet without a business
  name, or use a safe phrase like "How can I help you today?"
simulation_max_turns: 3
dynamic_variables:
  agent_first_name: "Tiffany"
  business_name: ""
  industry: "painting contractor"
  industry_specialty: ""
  time_of_day: "morning"
  is_open_now: "true"
  is_after_hours: "false"
  after_hours_mode: "take_message"
  busy_mode: "take_message"
  catch_mode: "APP_AND_PHONE_SIMUL_RING"
  public_number_mode: "ASPIRE_NEW_NUMBER"
  greeting_name_override: ""
  pronunciation_override: ""
  owner_title: "Mr."
  owner_formal_name: "Mr. Scott"
  business_city: ""
  business_state: ""
  routing_owner_phone: "+18503666647"
  routing_sales_phone: "+18503666647"
  routing_support_phone: "+18503666647"
  routing_billing_phone: "+18503666647"
  routing_scheduling_phone: "+18503666647"
  routing_owner_name: "Tonio Scott"
  routing_sales_name: "Tonio Scott"
  routing_support_name: "Tonio Scott"
  routing_billing_name: "Tonio Scott"
  routing_scheduling_name: "Tonio Scott"
  routing_contacts_summary: "Owner: Tonio Scott"
  configured_roles: "owner,sales,support,billing,scheduling"
  caller_first_name: ""
  caller_last_name: ""
  caller_is_known: "false"
  caller_display_name: ""
  caller_company: ""
  caller_last_call_summary: ""
  caller_history_summary: ""
  caller_total_calls: "0"
  caller_last_seen_days_ago: ""
  caller_intent: ""
  caller_name: ""
  callback_number: ""
  transfer_target: ""
  first_name: ""
  last_name: ""
success_condition: >
  The business_name dyn_var is empty for this test. The agent's first turn must NOT contain
  the phrase "thank you for calling" or "calling [empty]" or any sentence with the word
  "calling" followed immediately by a period or by the word "this". The agent must instead
  open with a clean self-introduction: a greeting like "Hi" or "Hello" followed by the agent's
  name and an offer of help. The agent must identify as Tiffany.
success_examples:
  - "Good afternoon, this is Tiffany. How can I help you today?"
  - "Hi, this is Tiffany — thanks for calling! How can I assist you?"
  - "Hello, you've reached our front desk. I'm Tiffany. What can I do for you?"
failure_examples:
  - "Good evening, thank you for calling . This is Sarah, the AI front desk assistant."
  - "Thank you for calling , this is Tiffany."
  - "Thank you for calling {{business_name}}, this is Tiffany."
tool_call_assertions: []
aspire_law: "Law #3 — fail closed; Rule 15 — first-message empty-slot defense"
regression_coverage: >
  PRIMARY regression test for 2026-05-09 live call bug where Tiffany said
  'Good evening, thank you for calling . This is Sarah' — both the blank slot
  AND the wrong agent name. This test validates the blank-slot half of that bug.
