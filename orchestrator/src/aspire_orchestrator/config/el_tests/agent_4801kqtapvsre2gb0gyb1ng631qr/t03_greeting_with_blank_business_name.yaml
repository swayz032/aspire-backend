name: t03_greeting_with_blank_business_name
description: Webhook returns business_name="" — agent must NOT speak an empty slot; fallback phrasing required.
agent_id: agent_4801kqtapvsre2gb0gyb1ng631qr
agent_display_name: Tiffany
type: simulation
simulation_scenario: >
  The personalization webhook returned an empty string for business_name.
  The agent must open the call without producing the artifact "calling . This is"
  or any spoken empty slot. An acceptable fallback is to greet without a business
  name, or use a safe phrase like "How can I help you today?"
simulation_max_turns: 3
dynamic_variables:
  business_name: ""
  caller_is_known: "false"
  is_after_hours: "false"
  agent_first_name: "Tiffany"
  industry: "painting contractor"
  industry_specialty: ""
success_condition: >
  The agent's first turn does NOT contain the substring "calling . " (a period
  immediately following the word "calling" with a space and then "This" or any
  continuation). The agent does NOT speak a literal empty slot or a visible
  template token like "{{business_name}}". The agent does identify itself as
  Tiffany. The greeting is grammatically complete and professional regardless
  of the missing business name.
success_examples:
  - "Good afternoon, this is Tiffany. How can I help you today?"
  - "Hi, this is Tiffany — thanks for calling! How can I assist you?"
  - "Hello, you've reached our front desk. I'm Tiffany. What can I do for you?"
failure_examples:
  - "Good evening, thank you for calling . This is Sarah, the AI front desk assistant."
  - "Thank you for calling , this is Tiffany."
  - "Thank you for calling {{business_name}}, this is Tiffany."
tool_call_assertions: []
aspire_law: "Law #3 — fail closed; Rule 15 — first-message empty-slot defense"
regression_coverage: >
  PRIMARY regression test for 2026-05-09 live call bug where Tiffany said
  'Good evening, thank you for calling . This is Sarah' — both the blank slot
  AND the wrong agent name. This test validates the blank-slot half of that bug.
