name: t04_greeting_with_unknown_agent_id
description: When agent_first_name dyn_var is empty, agent must NOT verbalize an empty slot or substitute another agent's name.
agent_id: agent_4801kqtapvsre2gb0gyb1ng631qr
agent_display_name: Tiffany
type: simulation
simulation_scenario: >
  The personalization webhook returns an empty string for agent_first_name.
  The caller calls in and says "Hello?" to open the conversation.
  The agent must greet professionally and helpfully. The agent must NOT
  say "Hello, I'm Sarah" or "Hello, I'm Tiffany" if the name slot is empty,
  and must NOT verbalize the literal template token {{agent_first_name}} or
  produce an awkward silence where a name should appear. The agent should
  complete a short intake conversation and take the caller's details.
simulation_max_turns: 5
dynamic_variables:
  business_name: "Scott Painting Services"
  agent_first_name: ""
  is_after_hours: "false"
  industry: "painting contractor"
  industry_specialty: "residential and commercial painting"
success_condition: >
  The agent greets the caller professionally without using another agent's
  name as a substitute for the empty agent_first_name slot. The phrases
  "I'm Sarah", "I'm Tiffany", "This is Sarah", "This is {{agent_first_name}}"
  do NOT appear in the agent's turns. The agent does NOT read the literal
  token "{{agent_first_name}}" aloud. The agent does NOT produce a greeting
  with a blank where a name would appear (e.g., "Thank you for calling ,
  how can I help?"). The agent handles the call naturally and professionally.
success_examples:
  - "Hello! Thanks for calling Scott Painting Services. How can I help you today?"
  - "Good afternoon, you've reached Scott Painting Services. What can I do for you?"
failure_examples:
  - "Hello, I'm Sarah, the AI front desk assistant."
  - "Hi, this is {{agent_first_name}}."
  - "Good evening, thank you for calling . This is Sarah."
  - "Hello, I'm Tiffany — wait, let me correct that."
tool_call_assertions: []
aspire_law: "Law #3 — fail closed on missing dyn_var; no name substitution from other agents"
regression_coverage: >
  Validates prompt-layer defense when agent_first_name is empty. HTTP-level
  400 enforcement for unknown agent_id is covered by unit tests in
  tests/routes/test_sarah_agent_name_fallback.py::TestUnknownAgentId.
infra_coverage_note: >
  The HTTP 400 enforcement for unknown agent_id is tested at the unit level in
  tests/routes/test_sarah_agent_name_fallback.py::TestUnknownAgentId.
  This EL test covers the prompt-layer defense assuming the infra layer passed.
