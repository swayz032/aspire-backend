name: t04_greeting_with_unknown_agent_id
description: Infra-layer test — bogus agent_id must return 400 before any greeting is spoken. Annotated as infra-only; EL Tests cannot simulate HTTP 400.
agent_id: agent_4801kqtapvsre2gb0gyb1ng631qr
agent_display_name: Tiffany
type: llm
# NOTE: EL Tests (LLM eval) cannot simulate a pre-call HTTP 400 from sarah.py.
# This test validates the NEAREST testable behavior: when agent_first_name is
# missing or unresolved, the agent must not produce a greeting that substitutes
# a stale name or empty string. The HTTP-level 400 behavior is covered by the
# unit test in tests/routes/test_sarah_agent_name_fallback.py.
chat_history:
  - role: user
    time_in_call_secs: 0
    message: "Hello?"
dynamic_variables:
  business_name: "Scott Painting Services"
  agent_first_name: ""
  is_after_hours: "false"
  industry: "painting contractor"
  industry_specialty: "residential and commercial painting"
success_condition: >
  When agent_first_name is empty, the agent does NOT substitute another agent's
  name (e.g., "Sarah") and does NOT use a template token literally. The agent
  either uses a generic professional greeting that does not require a name,
  or remains silent on name while still greeting professionally. Under no
  circumstances does the agent say "Hello, I'm Sarah" or identify as any
  other named agent.
success_examples:
  - "Hello! Thanks for calling Scott Painting Services. How can I help?"
  - "Good afternoon, you've reached Scott Painting Services. How may I assist you today?"
failure_examples:
  - "Hello, I'm Sarah, the AI front desk assistant."
  - "Hi, this is {{agent_first_name}}."
  - "Good evening, thank you for calling . This is Sarah."
tool_call_assertions: []
aspire_law: "Law #3 — fail closed; Law #14 — no agent name confusion"
infra_coverage_note: >
  The HTTP 400 enforcement for unknown agent_id is tested at the unit level in
  tests/routes/test_sarah_agent_name_fallback.py::TestUnknownAgentId.
  This EL test covers the prompt-layer defense assuming the infra layer passed.
