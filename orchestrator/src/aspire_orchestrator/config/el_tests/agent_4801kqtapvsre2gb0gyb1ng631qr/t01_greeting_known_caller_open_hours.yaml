  last_name: ""
success_condition: >
  The agent greets the caller using the caller's first name (Alex) without
  prompting the caller to provide their name. The agent does NOT volunteer
  that it is an AI. The agent does NOT say "AI front desk assistant" in any
  turn. The agent identifies itself as Tiffany, not Sarah and not any other
  name. The agent includes the business name "Scott Painting Services" in the
  greeting. There is no time-of-day prefix like "Good morning" or "Good evening"
  immediately before the business name — the greeting starts with "Thank you
  for calling" or "You've reached" followed by the business name.
success_examples:
  - "Thank you for calling Scott Painting Services, this is Tiffany! Hi Alex, great to hear from you. How can I help you today?"
  - "You've reached Scott Painting Services, I'm Tiffany. Hey Alex — what can I do for you?"
failure_examples:
  - "Good evening, thank you for calling . This is Tiffany, the AI front desk assistant."
  - "Hello, my name is Sarah."
  - "Hi, I'm an AI assistant. How may I help you?"
  - "Thank you for calling [BLANK], this is Tiffany."
tool_call_assertions: []
aspire_law: "Law #6 — personalization scoped to tenant; Law #3 — fail closed on blank business_name"
regression_coverage: "Catches the 2026-05-09 'calling . This is' empty-slot regression"
