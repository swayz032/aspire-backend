name: Robots (Aspire)

on:
  workflow_dispatch:
    inputs:
      env:
        description: "staging|canary|production"
        required: true
        default: "staging"

jobs:
  robots:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install -r robots/requirements.txt
      - name: Run robots validate
        run: |
          python3 robots/run_suite.py --config robots.config.yaml --env ${{ inputs.env }} --version-ref ${{ github.sha }}
      - name: Upload evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: robots-evidence
          path: robots/out/
