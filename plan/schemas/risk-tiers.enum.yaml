  claude_md_section: "## 4) Green / Yellow / Red Risk Tiers"
  related_schemas:
    - "receipts.schema.v1.yaml"
    - "capability-token.schema.v1.yaml"
  phase_introduced: "Phase 1"
  gates_related:
    - "Gate 3: Forced Escalation (video required for RED tier)"
    - "Gate 5: Cold/Warm/Hot Authority UI Contract"
