# ============================================================================
# ASPIRE SKILL PACK REGISTRY - STATUS TRACKING
# ============================================================================
# Single Source of Truth for skill pack implementation status
# 
# PURPOSE: Track skill pack lifecycle from design → implementation → production
# VERSION: 1.0.0
# LAST UPDATED: 2026-02-04
# ============================================================================

schema_version: "1.0.0"
registry_name: "skill-pack-registry"
certification_schema: "${ECOSYSTEM_ROOT}/platform/trust-spine/12_CERTIFICATION/pack_manifest.schema.json"
manifest_template: "${ECOSYSTEM_ROOT}/platform/trust-spine/08_CLAUDE_JOB_KIT/PHASE_3_SKILL_PACKS_CERTIFICATION/TEMPLATES/PACK_MANIFEST_TEMPLATE.json"
description: |
  Comprehensive registry of all Aspire skill packs with their implementation
  status, phase assignments, and certification status.

manifest_path_note: |
  manifest_path values are TARGET paths for Phase 2+ implementation.
  These files do not exist until the skill pack enters 'implementing' status.
  The 'status' field on each pack indicates current lifecycle state.
  Use validate_skillpacks_registry.py to validate — packs in 'designed'
  status are expected to have missing manifests.

# ============================================================================
# SKILL PACK LIFECYCLE STATES
# ============================================================================
lifecycle_states:
  designed:
    description: "Manifest and specifications defined"
    phase_typical: "0A"
  implementing:
    description: "Active development in progress"
    phase_typical: "1-2"
  testing:
    description: "Integration and certification testing"
    phase_typical: "2-4"
  certified:
    description: "Passed TC-01/02/03 certification"
    phase_typical: "4"
  production:
    description: "Deployed and operational"
    phase_typical: "5+"

