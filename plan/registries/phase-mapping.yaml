schema_version: "1.1.0"
registry_name: "phase-mapping"
description: |
  Cross-reference between MANIFEST build order (Phase A-F) and
  Production Roadmap phases (Phase 0A-6). Both systems are valid;
  MANIFEST describes the architectural build order, Roadmap describes
  the operational timeline with week numbers.

# ============================================================================
# PHASE MAPPING
# ============================================================================
mapping:

  # --- MANIFEST Phase A → Roadmap Phase 0B + Phase 1A ---
  phase_a:
    manifest:
      id: "A"
      name: "Trust Spine Foundation"
      focus: "Migrations, RLS, receipts, outbox"
      build_order: 1
    roadmap:
      phases: ["0B", "1A"]
      weeks: "2-5"
      name: "Trust Spine Deploy + Substrate Validation"
    deliverables:
      - "Trust Spine canonical migrations deployed (see CANONICAL_PATHS.md for exact counts)"
      - "8 Edge Functions deployed"
      - "RLS policies on all tenant-scoped tables"
      - "Receipt hash-chain verified"
      - "Outbox concurrency tested"

  # --- MANIFEST Phase B → Roadmap Phase 1B ---
  phase_b:
    manifest:
      id: "B"
      name: "Executor + Provider Call Log"
      focus: "Outbox worker, deterministic retries"
      build_order: 2
    roadmap:
      phases: ["1B"]
      weeks: "4-10"
      name: "Intelligence Layer Integration"
    deliverables:
      - "LangGraph orchestrator operational"
      - "Safety Gateway (NeMo + Presidio)"
      - "Capability token minting"
      - "Receipt integration with correlation_id"

  # --- MANIFEST Phase C → Roadmap Phase 1B ---
  phase_c:
    manifest:
      id: "C"
      name: "Gateway Boundary"
      focus: "Propose/approve/deny, tool allowlists, policy eval"
      build_order: 3
    roadmap:
      phases: ["1B"]
      weeks: "6-10"
      name: "Platform Contracts + Backend APIs"
    deliverables:
      - "Intent Ingest API"
      - "Capability Provider API"
      - "Receipt + Evidence API"
      - "Policy evaluation integration"
      - "Backend APIs matching mobile contracts"

  # --- MANIFEST Phase D → Roadmap Phase 2 (weeks 16-19) ---
  phase_d:
    manifest:
      id: "D"
      name: "Providers"
      focus: "Merge providers into platform with gate boundaries"
      build_order: 4
    roadmap:
      phases: ["2"]
      weeks: "15-20"
      name: "Finance + Legal Skill Packs"
    deliverables:
      - "Provider adapters (Stripe, QuickBooks, Moov, etc.)"
      - "Outbox job submission pattern"
      - "Provider certification tests"
      - "Finance office skill packs (Finn, Milo, Teressa)"
      - "Legal skill pack (Clara)"

  # --- MANIFEST Phase E → Roadmap Phase 2 (weeks 8-15) ---
  phase_e:
    manifest:
      id: "E"
      name: "Desks / Skill Packs"
      focus: "Proposal-only unless policy allows execution"
      build_order: 5
    roadmap:
      phases: ["2"]
      weeks: "8-14"
      name: "Channel Skill Packs"
    deliverables:
      - "6 channel skill packs (Sarah, Eli, Quinn, Nora, Adam, Tec)"
      - "Skill pack manifest compliance"
      - "Outbox integration per skill pack"
      - "Certification tests (TC-01, TC-02, TC-03)"

  # --- MANIFEST Phase F → Roadmap Phase 3 ---
  phase_f:
    manifest:
      id: "F"
      name: "UI Wiring"
      focus: "Authority Queue, receipts viewer, provider health"
      build_order: 6
    roadmap:
      phases: ["3"]
      weeks: "21-24"
      name: "Mobile App Integration"
    deliverables:
      - "Authority Dashboard wired to backend"
      - "Receipts viewer with hash verification"
      - "LiveKit integration (Cold/Warm/Hot states)"
      - "Degradation ladder"
      - "Governance enforcement in mobile UI"

