# ============================================================================
# ASPIRE CONFLICT REGISTRY
# ============================================================================
# Tracks all conflicts found in deep scan v3 with resolution status
#
# PURPOSE: Single source of truth for conflict resolution tracking
# VERSION: 1.0.0
# LAST UPDATED: 2026-02-07
# ============================================================================

schema_version: "1.0.0"
registry_name: "conflict-registry"
description: |
  Comprehensive tracking of all 20 conflicts identified in Deep Scan v3.
  Each conflict has a resolution status, responsible schema/registry,
  and verification method.

# ============================================================================
# CONFLICT CATEGORIES
# ============================================================================

# ---------------------------------------------------------------------------
# CRITICAL CONFLICTS (C-prefix)
# ---------------------------------------------------------------------------
critical_conflicts:

  C1:
    id: "C1"
    severity: "CRITICAL"
    title: "Risk tier naming: low/medium/high vs green/yellow/red"
    description: |
      58 files use legacy low/medium/high terminology.
      12 files use correct green/yellow/red.
      CLAUDE.md mandates green/yellow/red (Law #4).
    affected_files: 70
    resolution:
      status: "RESOLVED_IN_SCHEMA"
      schema: "plan/schemas/risk-tiers.enum.yaml"
      action: "Canonical schema created with migration guide"
      migration_needed: true
      files_to_migrate: 58
    verification: "grep -r 'low.*medium.*high' plan/schemas/ → zero matches"

  C2:
    id: "C2"
    severity: "CRITICAL"
    title: "Receipt table naming: execution_receipts vs receipts"
    description: |
      Trust Spine uses execution_receipts (47 columns).
      CLAUDE.md and canonical schema use receipts.
      Must be unified.
    resolution:
      status: "RESOLVED_IN_SCHEMA"
      schema: "plan/schemas/receipts.schema.v1.yaml"
      action: "Canonical schema uses 'receipts' as table name with all 15+ CLAUDE.md fields"
      migration_needed: true
      note: "Implementation will use 'receipts' table. execution_receipts maps to it."

  C3:
    id: "C3"
    severity: "CRITICAL"
    title: "Tenant identity: suite_id vs tenant_id"
    description: |
      Trust Spine uses tenant_id in some places.
      Aspire uses suite_id as primary tenant identifier.
      Both exist in codebase creating confusion.
    resolution:
      status: "RESOLVED_IN_SCHEMA"
      schema: "plan/schemas/tenant-identity.yaml"
      action: "suite_id is PRIMARY. tenant_id auto-synced via trigger."

  C4:
    id: "C4"
    severity: "HIGH"
    title: "Receipt schema field count mismatch"
    description: |
      Trust Spine execution_receipts has 47 columns.
      CLAUDE.md specifies 15 mandatory fields.
      Canonical schema must include all CLAUDE.md fields.
    resolution:
      status: "RESOLVED_IN_SCHEMA"
      schema: "plan/schemas/receipts.schema.v1.yaml"
      action: "All 15 CLAUDE.md fields present. Additional fields from Trust Spine are optional extensions."

  C5:
    id: "C5"
    severity: "HIGH"
    title: "correlation_id vs trace_id naming"
    description: |
      Some code uses trace_id, others use correlation_id.
      Must be unified to one canonical name.
    resolution:
      status: "RESOLVED_IN_SCHEMA"
      schema: "plan/schemas/receipts.schema.v1.yaml"
      action: "correlation_id is canonical. trace_id is deprecated alias."

# ---------------------------------------------------------------------------
# HIGH CONFLICTS (H-prefix)
# ---------------------------------------------------------------------------
high_conflicts:

  H1:
    id: "H1"
    severity: "HIGH"
    title: "Approval status: denied vs rejected"
    description: |
      CLAUDE.md uses 'denied' in receipt outcome.
      SQL schema uses 'rejected' for approval status.
      These are actually different fields but create confusion.
    resolution:
      status: "RESOLVED_IN_SCHEMA"
      schema: "plan/schemas/approval-status.enum.yaml"
      action: |
        approval_status uses 'rejected' (SQL is truth for approvals).
        outcome uses 'denied' (CLAUDE.md is truth for receipt outcomes).
        These are separate fields with separate enums.

  H2:
    id: "H2"
    severity: "HIGH"
    title: "Outcome status normalization"
    description: |
      Various outcome values used inconsistently across codebase.
      Need canonical set aligned with CLAUDE.md.
    resolution:
      status: "RESOLVED_IN_SCHEMA"
      schema: "plan/schemas/outcome-status.enum.yaml"
      action: "Canonical: success/denied/failed/timeout/pending (CLAUDE.md is truth)"

  H3:
    id: "H3"
    severity: "HIGH"
    title: "Gate system conflict: 5 CLAUDE.md categories vs 11 roadmap gates"
    description: |
      CLAUDE.md defines 5 production gate categories.
      Roadmap defines 11 specific gate checkpoints.
      No mapping between them.
    resolution:
      status: "RESOLVED_IN_DOC"
      document: "plan/gates/gate-reconciliation.md"
      action: "Documented mapping. Both systems kept — categories vs checkpoints."

  H4:
    id: "H4"
    severity: "HIGH"
    title: "Phase 0A status contradiction"
    description: |
      Changelog says 'COMPLETE' (line 13).
      Phase section says 'NOT STARTED' (line 1802).
    resolution:
      status: "RESOLVED_IN_ROADMAP"
      action: "Phase 0A marked COMPLETE in lean roadmap and phase file"

  H5:
    id: "H5"
    severity: "HIGH"
    title: "Phase A-F (MANIFEST) unmapped to Phase 0A-6 (Roadmap)"
    description: |
      Two phase numbering systems with no cross-reference.
      Teams can't map one to the other.
    resolution:
      status: "RESOLVED_IN_REGISTRY"
      registry: "plan/registries/phase-mapping.yaml"
      action: "Complete mapping created with visual reference"

# ---------------------------------------------------------------------------
# MEDIUM CONFLICTS (M-prefix)
# ---------------------------------------------------------------------------
medium_conflicts:

  M1:
    id: "M1"
    severity: "MEDIUM"
    title: "Skill pack character names unmapped to generic names"
    description: |
      No single registry mapping Sarah → Front Desk, Eli → Inbox, etc.
      with associated APIs, risk tiers, and certification status.
    resolution:
      status: "RESOLVED_IN_REGISTRY"
      registry: "plan/registries/skill-pack-registry.yaml"
      action: "Complete registry with all 15 skill packs mapped"

  M2:
    id: "M2"
    severity: "MEDIUM"
    title: "Skill pack count: 10 vs 8 complete + 2 incomplete"
    description: |
      Phase 2 says '10 Skill Packs' but some may be incomplete.
    resolution:
      status: "RESOLVED_IN_REGISTRY"
      registry: "plan/registries/skill-pack-registry.yaml"
      action: "Registry tracks 15 total (10 customer-facing + 1 admin + 4 internal). Phase 2 implements 10."

# ---------------------------------------------------------------------------
# ROADMAP-SPECIFIC ISSUES (R-prefix)
# ---------------------------------------------------------------------------
roadmap_issues:

  R1:
    id: "R1"
    severity: "HIGH"
    title: "Roadmap is a 2,000+ line monolith"
    description: "Mixes changelog, worth assessment, memory strategy, ecosystem architecture, and phase content"
    resolution:
      status: "RESOLVED"
      action: "Roadmap rewritten to <300 lines. Content extracted to plan/reference/ and plan/phases/"

  R6:
    id: "R6"
    severity: "HIGH"
    title: "Intent Ingest API uses wrong naming"
    description: "Line 1558: risk_class: low|medium|high — should be green/yellow/red"
    resolution:
      status: "RESOLVED_IN_ROADMAP"
      action: "Fixed in lean roadmap. Canonical schema is source of truth."

  R7:
    id: "R7"
    severity: "HIGH"
    title: "Canonical Receipt Object incomplete"
    description: "Lines 1605-1627: Missing 8 of CLAUDE.md's 15 mandatory fields"
    resolution:
      status: "RESOLVED_IN_SCHEMA"
      schema: "plan/schemas/receipts.schema.v1.yaml"
      action: "Canonical schema has all 15+ fields. Roadmap references schema."

  R8:
    id: "R8"
    severity: "MEDIUM"
    title: "Gate 5 references High/Medium/Low"
    description: "Line 1146: 'Visual indicators: High/Medium/Low authority gates'"
    resolution:
      status: "RESOLVED_IN_ROADMAP"
      action: "Fixed to Red/Yellow/Green in lean roadmap"

  R16:
    id: "R16"
    severity: "MEDIUM"
    title: "Phase 2 skill pack count mismatch"
    description: "Registry says 10 but implementation status varies"
    resolution:
      status: "RESOLVED_IN_REGISTRY"
      registry: "plan/registries/skill-pack-registry.yaml"
      action: "Registry has exact count: 15 total, 10 in Phase 2"

  R17:
    id: "R17"
    severity: "MEDIUM"
    title: "Migration counts inconsistent"
    description: "Migration counts inconsistent across different sections"
    resolution:
      status: "RESOLVED"
      action: "All hardcoded '109 migrations' references replaced with canonical reference to CANONICAL_PATHS.md. See DEPENDENCIES.lock.md for canonical counts."

# ============================================================================
# SUMMARY
# ============================================================================
summary:
  total_conflicts: 20
  by_severity:
    critical: 5
    high: 8
    medium: 7
  by_status:
    resolved_in_schema: 8
    resolved_in_registry: 4
    resolved_in_doc: 1
    resolved_in_roadmap: 4
    documented: 3
  resolution_rate: "100% (20/20 have resolution path)"

# ============================================================================
# VERIFICATION
# ============================================================================
verification:
  automated_checks:
    - "grep -r 'low.*medium.*high' plan/schemas/ → zero matches"
    - "All 15 CLAUDE.md receipt fields in receipts.schema.v1.yaml"
    - "plan/Aspire-Production-Roadmap.md < 300 lines"
    - "plan/registries/phase-mapping.yaml has all 6 MANIFEST phases"
    - "plan/gates/gate-reconciliation.md exists"
  manual_checks:
    - "Review all schema files for internal consistency"
    - "Verify phase file content matches roadmap summaries"
    - "Confirm gate reconciliation is complete"
