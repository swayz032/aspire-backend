openapi: 3.0.3
info:
  title: Aspire Ops Telemetry Facade API
  version: "1.0.0"
  description: >
    Read-only, LLM-safe telemetry facade for Aspire Admin (Ava).
    This API is the only approved path for Admin Portal and Ava to observe operational state.
servers:
  - url: https://{host}
    variables:
      host:
        default: ops-telemetry-facade.internal
security:
  - bearerAuth: []
tags:
  - name: ops
    description: Operational telemetry (read-only)
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  parameters:
    CorrelationIdHeader:
      name: X-Correlation-Id
      in: header
      required: false
      schema:
        type: string
      description: Client-provided correlation id for tracing (if absent, server generates and returns one).
    Cursor:
      name: cursor
      in: query
      required: false
      schema:
        type: string
    Limit:
      name: limit
      in: query
      required: false
      schema:
        type: integer
        minimum: 1
        maximum: 200
        default: 50
  schemas:
    OpsError:
      type: object
      required: [code, message, correlation_id, retryable]
      properties:
        code: { type: string, example: "AUTHZ_DENIED" }
        message: { type: string }
        correlation_id: { type: string }
        retryable: { type: boolean }
        details: { type: object, additionalProperties: true }
    PageInfo:
      type: object
      required: [has_more]
      properties:
        has_more: { type: boolean }
        next_cursor: { type: string, nullable: true }
    Health:
      type: object
      required: [status, server_time, version]
      properties:
        status: { type: string, enum: ["ok"] }
        server_time: { type: string, format: date-time }
        version: { type: string }
    IncidentSummary:
      type: object
      required: [incident_id, state, severity, title, first_seen, last_seen, correlation_id]
      properties:
        incident_id: { type: string }
        state: { type: string, enum: ["open", "investigating", "mitigated", "closed"] }
        severity: { type: string, enum: ["sev1", "sev2", "sev3", "sev4"] }
        title: { type: string }
        correlation_id: { type: string }
        suite_id: { type: string, nullable: true, description: "May be null for global incidents." }
        first_seen: { type: string, format: date-time }
        last_seen: { type: string, format: date-time }
    ReceiptSummary:
      type: object
      required: [receipt_id, correlation_id, action_type, risk_tier, outcome, created_at]
      properties:
        receipt_id: { type: string }
        correlation_id: { type: string }
        suite_id: { type: string }
        office_id: { type: string }
        action_type: { type: string }
        risk_tier: { type: string, enum: ["green", "yellow", "red"] }
        outcome: { type: string }
        created_at: { type: string, format: date-time }
    ProviderCallSummary:
      type: object
      required: [call_id, provider, action, status, started_at, correlation_id]
      properties:
        call_id: { type: string }
        correlation_id: { type: string }
        provider: { type: string, example: "stripe" }
        action: { type: string, example: "invoice.send" }
        status: { type: string, enum: ["success", "error"] }
        http_status: { type: integer, nullable: true }
        retry_count: { type: integer, default: 0 }
        started_at: { type: string, format: date-time }
        finished_at: { type: string, format: date-time, nullable: true }
        redacted_payload_preview:
          type: string
          description: "Always redacted. Truncated preview for debugging only."
    OutboxStatus:
      type: object
      required: [queue_depth, oldest_age_seconds, stuck_jobs, server_time]
      properties:
        server_time: { type: string, format: date-time }
        queue_depth: { type: integer }
        oldest_age_seconds: { type: integer }
        stuck_jobs: { type: integer }
    RolloutSummary:
      type: object
      required: [rollout_id, state, created_at]
      properties:
        rollout_id: { type: string }
        state: { type: string }
        created_at: { type: string, format: date-time }
        canary_percent: { type: number, nullable: true }
        target:
          type: object
          additionalProperties: true
paths:
  /admin/ops/health:
    get:
      tags: [ops]
      summary: Health check
      parameters:
        - $ref: '#/components/parameters/CorrelationIdHeader'
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Health' }
        "401":
          description: Unauthorized
          content:
            application/json:
              schema: { $ref: '#/components/schemas/OpsError' }

  /admin/ops/incidents:
    get:
      tags: [ops]
      summary: List incidents
      parameters:
        - $ref: '#/components/parameters/CorrelationIdHeader'
        - name: state
          in: query
          required: false
          schema: { type: string }
        - name: severity
          in: query
          required: false
          schema: { type: string }
        - $ref: '#/components/parameters/Cursor'
        - $ref: '#/components/parameters/Limit'
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                required: [items, page, server_time]
                properties:
                  server_time: { type: string, format: date-time }
                  items:
                    type: array
                    items: { $ref: '#/components/schemas/IncidentSummary' }
                  page: { $ref: '#/components/schemas/PageInfo' }
        "401":
          description: Unauthorized
          content:
            application/json:
              schema: { $ref: '#/components/schemas/OpsError' }
        "403":
          description: Forbidden
          content:
            application/json:
              schema: { $ref: '#/components/schemas/OpsError' }

  /admin/ops/incidents/{incident_id}:
    get:
      tags: [ops]
      summary: Get incident details
      parameters:
        - $ref: '#/components/parameters/CorrelationIdHeader'
        - name: incident_id
          in: path
          required: true
          schema: { type: string }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                required: [incident_id, state, severity, timeline, evidence_pack, server_time]
                properties:
                  server_time: { type: string, format: date-time }
                  incident_id: { type: string }
                  state: { type: string }
                  severity: { type: string }
                  timeline:
                    type: array
                    items: { type: object, additionalProperties: true }
                  evidence_pack:
                    type: object
                    additionalProperties: true
        "404":
          description: Not Found
          content:
            application/json:
              schema: { $ref: '#/components/schemas/OpsError' }

  /admin/ops/receipts:
    get:
      tags: [ops]
      summary: List receipts (sanitized)
      parameters:
        - $ref: '#/components/parameters/CorrelationIdHeader'
        - name: correlation_id
          in: query
          required: false
          schema: { type: string }
        - name: suite_id
          in: query
          required: false
          schema: { type: string }
        - name: office_id
          in: query
          required: false
          schema: { type: string }
        - name: action_type
          in: query
          required: false
          schema: { type: string }
        - name: since
          in: query
          required: false
          schema: { type: string, format: date-time }
        - name: until
          in: query
          required: false
          schema: { type: string, format: date-time }
        - $ref: '#/components/parameters/Cursor'
        - $ref: '#/components/parameters/Limit'
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                required: [items, page, server_time]
                properties:
                  server_time: { type: string, format: date-time }
                  items:
                    type: array
                    items: { $ref: '#/components/schemas/ReceiptSummary' }
                  page: { $ref: '#/components/schemas/PageInfo' }

  /admin/ops/provider-calls:
    get:
      tags: [ops]
      summary: List provider calls (redacted)
      parameters:
        - $ref: '#/components/parameters/CorrelationIdHeader'
        - name: provider
          in: query
          required: false
          schema: { type: string }
        - name: status
          in: query
          required: false
          schema: { type: string, enum: ["success", "error"] }
        - name: correlation_id
          in: query
          required: false
          schema: { type: string }
        - $ref: '#/components/parameters/Cursor'
        - $ref: '#/components/parameters/Limit'
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                required: [items, page, server_time]
                properties:
                  server_time: { type: string, format: date-time }
                  items:
                    type: array
                    items: { $ref: '#/components/schemas/ProviderCallSummary' }
                  page: { $ref: '#/components/schemas/PageInfo' }

  /admin/ops/outbox:
    get:
      tags: [ops]
      summary: Outbox queue status
      parameters:
        - $ref: '#/components/parameters/CorrelationIdHeader'
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: '#/components/schemas/OutboxStatus' }

  /admin/ops/rollouts:
    get:
      tags: [ops]
      summary: List rollouts
      parameters:
        - $ref: '#/components/parameters/CorrelationIdHeader'
        - $ref: '#/components/parameters/Cursor'
        - $ref: '#/components/parameters/Limit'
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                required: [items, page, server_time]
                properties:
                  server_time: { type: string, format: date-time }
                  items:
                    type: array
                    items: { $ref: '#/components/schemas/RolloutSummary' }
                  page: { $ref: '#/components/schemas/PageInfo' }
