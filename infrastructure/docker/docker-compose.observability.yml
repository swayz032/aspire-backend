services:
  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.96.0
    command: ["--config=/etc/otelcol/config.yml"]
    volumes:
      - ./otel/otel-collector.config.yml:/etc/otelcol/config.yml:ro
    ports:
      - "4317:4317"  # OTLP gRPC
      - "4318:4318"  # OTLP HTTP
      - "8889:8889"  # Prometheus exporter
      - "13133:13133"  # Collector health
    restart: unless-stopped

  prometheus:
    image: prom/prometheus:v2.50.1
    volumes:
      - ./otel/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./otel/alert_rules.yml:/etc/prometheus/alert_rules.yml:ro
    ports:
      - "9090:9090"
    restart: unless-stopped

  grafana:
    image: grafana/grafana:10.4.0
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD:?Set GRAFANA_ADMIN_PASSWORD in .env}
      - SUPABASE_DB_HOST=${SUPABASE_DB_HOST:-aws-0-us-east-1.pooler.supabase.com}
      - SUPABASE_DB_PORT=${SUPABASE_DB_PORT:-6543}
      - SUPABASE_DB_USER=${SUPABASE_DB_USER:-postgres.qtuehjqlcmfcascqjjhc}
      - SUPABASE_DB_PASSWORD=${SUPABASE_DB_PASSWORD:-}
    volumes:
      - grafana-data:/var/lib/grafana
      - ./otel/grafana-provisioning:/etc/grafana/provisioning
    restart: unless-stopped

volumes:
  grafana-data:
