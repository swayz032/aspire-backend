# Temporal dynamic config for local development
# See: https://docs.temporal.io/references/dynamic-configuration

system.forceSearchAttributesCacheRefreshOnRead:
  - value: true
    constraints: {}

# Allow larger payloads for dev (2MB)
limit.maxIDLength:
  - value: 1000
    constraints: {}

# History size limits
history.maximumPageSize:
  - value: 1000
    constraints: {}
